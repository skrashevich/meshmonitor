# Default values for meshmonitor

# Image configuration
image:
  repository: ghcr.io/yeraze/meshmonitor
  pullPolicy: IfNotPresent
  tag: "latest"

# Number of replicas
replicaCount: 1

# Service configuration
service:
  type: ClusterIP
  port: 80
  targetPort: 3001

# Ingress configuration
ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: meshmonitor.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
    # - secretName: meshmonitor-tls
    #   hosts:
    #     - meshmonitor.local

# Environment variables
# Seed values for the first Meshtastic source on first boot.
# MeshMonitor 4.0 manages additional sources via the Dashboard → Sources UI;
# changing these values after bootstrap does NOT reconfigure the existing source.
env:
  # IP address of the bootstrap source (seeds the first source on a fresh install)
  meshtasticNodeIp: "192.168.1.100"

  # Enable HTTPS connection to node (optional)
  meshtasticUseTls: "false"

  # Environment mode (optional)
  nodeEnv: "production"

  # Server port - should match service.targetPort (optional)
  port: "3001"

  # Runtime base URL path for subfolder deployment (optional)
  # Example: "/meshmonitor" for hosting at https://example.com/meshmonitor/
  baseUrl: ""

# Additional environment variables
# Use this to pass any environment variable to MeshMonitor that isn't
# covered by the fields above (e.g., CORS, reverse proxy, database, etc.)
# Format: standard Kubernetes env var syntax
# Example:
#   extraEnv:
#     - name: ALLOWED_ORIGINS
#       value: "https://meshmonitor.example.com"
#     - name: TRUST_PROXY
#       value: "true"
#     - name: DATABASE_URL
#       value: "postgresql://user:pass@host:5432/meshmonitor"
#     - name: SESSION_SECRET
#       valueFrom:
#         secretKeyRef:
#           name: meshmonitor-secrets
#           key: session-secret
extraEnv: []

# Auto-upgrade configuration (Docker only)
# Note: Kubernetes deployments should use kubectl/helm for upgrades
autoupgrade:
  # Enable auto-upgrade feature in the application UI
  # When enabled, an "Upgrade Now" button appears in the update notification banner
  enabled: false

  # Note: For Docker deployments, use docker-compose.upgrade.yml overlay
  # For Kubernetes, this setting only enables the UI feature - actual upgrades
  # should be performed via standard Kubernetes deployment updates

# Persistent storage for SQLite database
persistence:
  enabled: true
  # storageClass: ""
  accessMode: ReadWriteOnce
  size: 1Gi
  # existingClaim: ""

# Resource limits and requests
resources: {}
  # limits:
  #   cpu: 500m
  #   memory: 512Mi
  # requests:
  #   cpu: 250m
  #   memory: 256Mi

# Node selector for pod assignment
nodeSelector: {}

# Tolerations for pod assignment
tolerations: []

# Affinity for pod assignment
affinity: {}

# Security context
podSecurityContext:
  fsGroup: 1000

securityContext:
  runAsUser: 1000
  runAsNonRoot: true
  readOnlyRootFilesystem: false
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  seccompProfile:
    type: RuntimeDefault
