              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      tags:
        - Messages
      summary: Send a message
      description: |
        Send a new message to a channel or directly to a node.

        **Permission Requirements:**
        - Channel messages require `channel_X:write` permission (where X is the channel number)
        - Direct messages require `messages:write` permission

        **Usage:**
        - Provide `channel` for broadcast messages to a channel
        - Provide `toNodeId` for direct messages to a specific node
        - Do not provide both `channel` and `toNodeId`

        **Multi-Message Breakup:**
        - Meshtastic has a 200-byte payload limit for text messages
        - Messages longer than 200 bytes are automatically split into multiple parts (max 3 parts, ~600 bytes)
        - Messages requiring more than 3 parts will be rejected with HTTP 413 (Payload Too Large)
        - Split messages are queued and delivered with 30-second intervals between parts
        - Returns HTTP 202 (Accepted) when messages are queued for delivery
        - The response includes `messageCount` and `queueIds` for tracking split messages
        - Only the first message part will have the `replyId` set (if provided)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendMessageRequest'
            examples:
              channelMessage:
                summary: Send to a channel
                value:
                  text: "Hello from the API!"
                  channel: 0
              directMessage:
                summary: Send direct message
                value:
                  text: "Private message via API"
                  toNodeId: "!a1b2c3d4"
              replyMessage:
                summary: Reply to a message
                value:
                  text: "This is a reply"
                  channel: 0
                  replyId: 123456789
              longMessage:
                summary: Long message (will be split)
                description: Messages exceeding 200 bytes are automatically split and queued
                value:
                  text: "This is a longer message that exceeds the Meshtastic payload limit of 200 bytes. When sent via the API, it will be automatically split into multiple parts and queued for delivery with 30-second intervals between each part. This helps ensure reliable delivery of longer content."
                  channel: 0
      responses:
        '201':
          description: Message sent successfully (short message, ≤200 bytes)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SendMessageResponse'
        '202':
          description: Message queued for delivery (long message split into multiple parts)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SendMessageQueuedResponse'
        '400':
          description: Bad request (invalid parameters)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                missingText:
                  summary: Missing text
                  value:
                    success: false
                    error: "Bad Request"
                    message: "Message text is required"
                bothChannelAndNode:
                  summary: Both channel and toNodeId provided
                  value:
                    success: false
                    error: "Bad Request"
                    message: "Provide either channel OR toNodeId, not both"
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden - insufficient permissions
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  error:
                    type: string
                    example: "Forbidden"
                  message:
                    type: string
                    example: "Insufficient permissions"
                  required:
                    type: object
                    properties:
                      resource:
                        type: string
                        example: "channel_0"
                      action:
                        type: string
                        example: "write"
        '413':
          description: Payload too large - message would require more than 3 parts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                success: false
                error: "Payload Too Large"
                message: "Message too long. Would require 5 parts but maximum is 3 parts (~600 bytes)"
        '503':
          description: Service unavailable - not connected to Meshtastic node
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                success: false
                error: "Service Unavailable"
                message: "Not connected to Meshtastic node"
        '500':
