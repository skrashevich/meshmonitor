openapi: 3.0.3
info:
  title: MeshMonitor API
  description: |
    MeshMonitor REST API v1 provides programmatic access to mesh network data.

    ## Multi-source (breaking change — spec 2.0.0)
    MeshMonitor 4.0 runs one installation against many Meshtastic/MQTT/MeshCore
    sources. Per-resource endpoints are now canonical under
    `/api/v1/sources/{sourceId}/...`:

    | Resource | Canonical path |
    |---|---|
    | Nodes | `/api/v1/sources/{sourceId}/nodes` |
    | Messages | `/api/v1/sources/{sourceId}/messages` |
    | Channels | `/api/v1/sources/{sourceId}/channels` |
    | Telemetry | `/api/v1/sources/{sourceId}/telemetry` |
    | Traceroutes | `/api/v1/sources/{sourceId}/traceroutes` |
    | Packets | `/api/v1/sources/{sourceId}/packets` |
    | Network | `/api/v1/sources/{sourceId}/network` |
    | Position history | `/api/v1/sources/{sourceId}/nodes/{nodeId}/position-history` |
    | Status | `/api/v1/sources/{sourceId}/status` |

    The literal string `default` may be used for `{sourceId}` — it resolves to
    the first source the authenticated token has `read` permission on (or the
    first enabled source for admin tokens). 404 if none is accessible.

    `GET /api/v1/sources` lists the sources the token can read.

    `/api/v1/solar` and `/api/v1/channel-database` remain deployment-global
    (no source scope).

    Legacy root paths (`/api/v1/nodes?sourceId=...`, etc.) still respond for
    one release but attach a `Warning: 299` response header and will be
    removed in a future release.

    ## Authentication
    All v1 API endpoints require API token authentication using Bearer tokens in the Authorization header.

    ```
    Authorization: Bearer mm_v1_<your_token_here>
    ```

    ## Generating API Tokens
    API tokens can be generated from your User Settings page. Each user account can have one active token at a time.
    Generating a new token automatically revokes the previous token.

    ## Rate Limiting
    API token requests are subject to more restrictive rate limiting than session-based authentication.

    ## API Versioning
    This API uses URL-based versioning. All endpoints are prefixed with `/api/v1/`.
    The spec version below reflects the multi-source reshape (2.0.0) while the
    URL prefix stays `v1` to keep existing token formats intact.
  version: 2.0.0
  contact:
    name: MeshMonitor Support
    url: https://github.com/aerospaceresearch/meshmonitor
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:8080/api/v1
    description: Development server
  - url: https://your-meshmonitor-instance.com/api/v1
    description: Production server

tags:
  - name: API Info
    description: API version and endpoint information
  - name: Sources
    description: Multi-source discovery (list sources the token can access)
  - name: Nodes
    description: Mesh network node information
  - name: Channels
    description: Mesh network channel configuration
  - name: Telemetry
    description: Telemetry data from mesh nodes
  - name: Messages
    description: Mesh network messages
  - name: Traceroutes
    description: Network path traceroute data
  - name: Network
    description: Network-wide statistics and topology
  - name: Packets
    description: Raw packet log data from the mesh network
  - name: Solar
    description: Solar production estimates from forecast.solar

security:
  - BearerAuth: []

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API Token
      description: |
        API token authentication. Use format: `Bearer mm_v1_<token>`

        Generate tokens from your User Settings page.

  parameters:
    SourceIdParam:
      name: sourceId
      in: path
      required: true
      description: |
        Source identifier. Either a UUID returned by `GET /api/v1/sources`, or
        the literal string `default` to resolve the first source the
        authenticated token has `read` permission on (admins get the first
        enabled source). Returns 404 if no accessible source exists.
      schema:
        type: string
        example: default

  schemas:
    Error:
      type: object
      required:
        - success
        - error
        - message
      properties:
        success:
          type: boolean
          example: false
        error:
          type: string
          example: "Unauthorized"
        message:
          type: string
          example: "API token required"

    APIInfo:
      type: object
      properties:
        version:
          type: string
          example: "v1"
        description:
          type: string
          example: "MeshMonitor REST API v1"
        documentation:
          type: string
          example: "/api/v1/docs"
        endpoints:
          type: object
          properties:
            nodes:
              type: string
              example: "/api/v1/nodes"
            channels:
              type: string
              example: "/api/v1/channels"
            telemetry:
              type: string
              example: "/api/v1/telemetry"
            traceroutes:
              type: string
              example: "/api/v1/traceroutes"
            messages:
              type: string
              example: "/api/v1/messages"
            network:
              type: string
              example: "/api/v1/network"

    Node:
      type: object
      properties:
        nodeId:
          type: string
          description: Unique node identifier (hex format)
          example: "!a1b2c3d4"
        nodeNum:
          type: integer
          description: Node number
          example: 2715451348
        longName:
          type: string
          description: Long name of the node
          example: "My Mesh Node"
        shortName:
          type: string
          description: Short name (4 characters)
          example: "MESH"
        role:
          type: string
          description: Node role in the mesh network
          enum: [CLIENT, ROUTER, ROUTER_CLIENT]
          example: "CLIENT"
        hwModel:
          type: string
          description: Hardware model
          example: "TBEAM"
        latitude:
          type: number
          format: double
          description: Node latitude
          example: 37.7749
        longitude:
          type: number
          format: double
          description: Node longitude
          example: -122.4194
        altitude:
          type: integer
          description: Node altitude in meters
          example: 50
        hopsAway:
          type: integer
          description: Number of hops from primary node
          example: 1
        lastHeard:
          type: integer
          description: Unix timestamp of last contact
          example: 1699564800
        snr:
          type: number
          format: float
          description: Signal-to-noise ratio
          example: 8.5

    NodeListResponse:
      type: object
      required:
        - success
        - count
        - data
      properties:
        success:
          type: boolean
          example: true
        count:
          type: integer
          description: Number of nodes returned
          example: 25
        data:
          type: array
          items:
            $ref: '#/components/schemas/Node'

    NodeResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/Node'

    PositionHistoryItem:
      type: object
      required:
        - timestamp
        - latitude
        - longitude
        - packetId
      properties:
        timestamp:
          type: integer
          description: Unix timestamp (ms) when the position was recorded
          example: 1700000000000
        latitude:
          type: number
          format: double
          description: Latitude in decimal degrees
          example: 33.749
        longitude:
          type: number
          format: double
          description: Longitude in decimal degrees
          example: -84.388
        altitude:
          type: number
          description: Altitude in meters
          example: 320
        groundSpeed:
          type: number
          description: Ground speed in m/s
          example: 5.2
        groundTrack:
          type: number
          description: Ground track (heading) in degrees
          example: 180
        packetId:
          type: integer
          nullable: true
          description: Meshtastic packet ID
          example: 12345

    PositionHistoryResponse:
      type: object
      required:
        - success
        - count
        - total
        - offset
        - limit
        - data
      properties:
        success:
          type: boolean
          example: true
        count:
          type: integer
          description: Number of positions in this response
          example: 50
        total:
          type: integer
          description: Total number of matching positions
          example: 150
        offset:
          type: integer
          description: Number of records skipped
          example: 0
        limit:
          type: integer
          description: Maximum records per page
          example: 1000
        data:
          type: array
          items:
            $ref: '#/components/schemas/PositionHistoryItem'

    Channel:
      type: object
      properties:
        id:
          type: integer
          description: Channel index (0-7)
          minimum: 0
          maximum: 7
          example: 0
        name:
          type: string
          description: Channel name
          example: "LongFast"
        role:
          type: integer
          description: Channel role (0=Disabled, 1=Primary, 2=Secondary)
          enum: [0, 1, 2]
          example: 1
        roleName:
          type: string
          description: Human-readable role name
          enum: ["Disabled", "Primary", "Secondary"]
          example: "Primary"
        uplinkEnabled:
          type: boolean
          description: Whether MQTT uplink is enabled for this channel
          example: true
        downlinkEnabled:
          type: boolean
          description: Whether MQTT downlink is enabled for this channel
          example: true
        positionPrecision:
          type: integer
          description: Location precision bits (0-32, where 0 means full precision disabled)
          minimum: 0
          maximum: 32
          example: 32

    ChannelListResponse:
      type: object
      required:
        - success
        - count
        - data
      properties:
        success:
          type: boolean
          example: true
        count:
          type: integer
          description: Number of channels returned
          example: 3
        data:
          type: array
          items:
            $ref: '#/components/schemas/Channel'

    ChannelResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/Channel'

    Telemetry:
      type: object
      properties:
        id:
          type: integer
          example: 12345
        nodeId:
          type: string
          description: Node identifier
          example: "!a1b2c3d4"
        timestamp:
          type: integer
          description: Unix timestamp
          example: 1699564800
        telemetryType:
          type: string
          description: Type of telemetry data
          enum: [device_metrics, environment_metrics, power_metrics, air_quality_metrics]
          example: "device_metrics"
        batteryLevel:
          type: integer
          description: Battery percentage (0-100)
          example: 85
        voltage:
          type: number
          format: float
          description: Voltage in volts
          example: 4.2
        channelUtilization:
          type: number
          format: float
          description: Channel utilization percentage
          example: 12.5
        airUtilTx:
          type: number
          format: float
          description: Air utilization for transmission
          example: 5.2
        temperature:
          type: number
          format: float
          description: Temperature in Celsius
          example: 25.5
        relativeHumidity:
          type: number
          format: float
          description: Relative humidity percentage
          example: 65.0
        barometricPressure:
          type: number
          format: float
          description: Barometric pressure in hPa
          example: 1013.25
        packetId:
          type: integer
          nullable: true
          description: Meshtastic mesh packet ID for deduplication. Null for computed/derived telemetry.
          example: 1234567890

    TelemetryListResponse:
      type: object
      required:
        - success
        - count
        - data
      properties:
        success:
          type: boolean
          example: true
        count:
          type: integer
          description: Number of telemetry records returned in this response
          example: 100
        total:
          type: integer
          description: Total number of telemetry records matching the filters (for pagination)
          example: 5432
        offset:
          type: integer
          description: Offset used for pagination
          example: 0
        limit:
          type: integer
          description: Limit used for pagination
          example: 1000
        data:
          type: array
          items:
            $ref: '#/components/schemas/Telemetry'

    Message:
      type: object
      properties:
        id:
          type: string
          description: Unique message identifier
          example: "msg_123456"
        fromNodeId:
          type: string
          description: Sender node ID
          example: "!a1b2c3d4"
        toNodeId:
          type: string
          description: Recipient node ID
          example: "!e5f6g7h8"
        channel:
          type: integer
          description: Channel number (-1 for direct messages)
          example: 0
        portnum:
          type: integer
          description: Port number (Meshtastic app type, e.g. 1=TEXT_MESSAGE_APP)
          example: 1
        text:
          type: string
          description: Message text content
          example: "Hello from the mesh!"
        timestamp:
          type: string
          format: date-time
          description: Message timestamp (ISO 8601)
          example: "2024-11-09T14:00:00.000Z"
        rxTime:
          type: integer
          description: Receive timestamp (Unix seconds from radio)
          example: 1699564802
        rxSnr:
          type: number
          format: float
          description: Receive SNR (signal-to-noise ratio in dB)
          example: 9.5
        rxRssi:
          type: integer
          description: Receive RSSI in dBm
          example: -95
        hopStart:
          type: integer
          description: Original hop count when the packet was sent
          example: 3
        hopLimit:
          type: integer
          description: Remaining hop count when received
          example: 1
        relayNode:
          type: integer
          description: Node number of the last node that relayed this message (0 if received directly)
          example: 2715451348
        replyId:
          type: integer
          description: Request ID of the message this is a reply to
          example: 123456789
        emoji:
          type: integer
          description: Emoji reaction (Unicode code point)
          example: 0
        viaMqtt:
          type: boolean
          description: Whether the message was received via MQTT bridge
          example: false
        deliveryState:
          type: string
          description: Delivery state for outbound messages
          enum: [delivered, confirmed, failed]
          example: "delivered"
        wantAck:
          type: boolean
          description: Whether the message requested acknowledgment
          example: false
        ackFailed:
          type: boolean
          description: Whether acknowledgment failed
          example: false
        routingErrorReceived:
          type: boolean
          description: Whether a routing error was received for this message
          example: false

    MessageListResponse:
      type: object
      required:
        - success
        - count
        - data
      properties:
        success:
          type: boolean
          example: true
        count:
          type: integer
          description: Number of messages returned
          example: 50
        data:
          type: array
          items:
            $ref: '#/components/schemas/Message'

    MessageResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/Message'

    SendMessageRequest:
      type: object
      required:
        - text
      properties:
        text:
          type: string
          description: |
            The message text to send. Messages longer than 200 bytes will be
            automatically split into multiple parts and queued for delivery.
          example: "Hello from the API!"
          minLength: 1
          maxLength: 1000
        channel:
          type: integer
          description: Channel number to send to (0-7). Required if toNodeId is not specified.
          minimum: 0
          maximum: 7
          example: 0
        toNodeId:
          type: string
          description: Node ID for direct message (e.g., "!a1b2c3d4"). Required if channel is not specified.
          pattern: '^![0-9a-fA-F]{1,8}$'
          example: "!a1b2c3d4"
        replyId:
          type: integer
          description: Request ID of the message being replied to (optional)
          example: 123456789

    SendMessageResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          required:
            - messageId
            - requestId
            - deliveryState
            - messageCount
          properties:
            messageId:
              type: string
              description: Unique message ID for tracking (format nodeNum_requestId)
              example: "2715451348_123456789"
            requestId:
              type: integer
              description: Request ID for matching delivery acknowledgments
              example: 123456789
            deliveryState:
              type: string
              description: Current delivery state
              enum: [pending, delivered, confirmed, failed]
              example: "pending"
            messageCount:
              type: integer
              description: Number of messages sent (always 1 for short messages)
              example: 1
            text:
              type: string
              description: The message text that was sent
              example: "Hello from the API!"
            channel:
              type: integer
              description: Channel the message was sent to (-1 for direct messages)
              example: 0
            toNodeId:
              type: string
              description: Destination node ID or "broadcast" for channel messages
              example: "broadcast"

    SendMessageQueuedResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          required:
            - deliveryState
            - messageCount
            - queueIds
          properties:
            deliveryState:
              type: string
              description: Current delivery state (always "queued" for split messages)
              enum: [queued]
              example: "queued"
            messageCount:
              type: integer
              description: Number of message parts the text was split into
              example: 3
            queueIds:
              type: array
              items:
                type: string
              description: Queue IDs for tracking each message part
              example: ["1234567890-abc123", "1234567891-def456", "1234567892-ghi789"]
            text:
              type: string
              description: The original message text that was sent
              example: "This is a very long message that exceeds the 200-byte limit..."
            channel:
              type: integer
              description: Channel the message was sent to (-1 for direct messages)
              example: 0
            toNodeId:
              type: string
              description: Destination node ID or "broadcast" for channel messages
              example: "broadcast"
            note:
              type: string
              description: Informational note about the message splitting
              example: "Message split into 3 parts, queued for delivery with 30-second intervals"

    Traceroute:
      type: object
      properties:
        id:
          type: integer
          example: 789
        fromNodeId:
          type: string
          description: Source node ID
          example: "!a1b2c3d4"
        toNodeId:
          type: string
          description: Destination node ID
          example: "!e5f6g7h8"
        route:
          type: string
          description: JSON array of node IDs in the route
          example: '["!a1b2c3d4", "!i9j0k1l2", "!e5f6g7h8"]'
        snrTowards:
          type: string
          description: JSON array of SNR values for each hop
          example: '[8.5, 7.2, 9.1]'
        routePositions:
          type: string
          nullable: true
          description: >
            JSON object mapping node numbers to their positions at traceroute completion time.
            Used to render historical traceroutes at the correct positions even when nodes have moved.
            Null for traceroutes recorded before this feature was added.
          example: '{"123456789":{"lat":33.1234,"lng":-117.5678,"alt":150},"987654321":{"lat":33.2345,"lng":-117.6789}}'
        timestamp:
          type: integer
          description: Unix timestamp
          example: 1699564800

    TracerouteListResponse:
      type: object
      required:
        - success
        - count
        - data
      properties:
        success:
          type: boolean
          example: true
        count:
          type: integer
          description: Number of traceroutes returned
          example: 10
        data:
          type: array
          items:
            $ref: '#/components/schemas/Traceroute'

    TracerouteResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/Traceroute'

    NetworkStats:
      type: object
      properties:
        totalNodes:
          type: integer
          description: Total number of nodes in the network
          example: 150
        activeNodes:
          type: integer
          description: Number of active nodes (last 7 days)
          example: 85
        tracerouteCount:
          type: integer
          description: Total number of traceroutes
          example: 245
        lastUpdated:
          type: integer
          description: Unix timestamp of last update
          example: 1699564800

    NetworkStatsResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/NetworkStats'

    TopologyNode:
      type: object
      properties:
        nodeId:
          type: string
          example: "!a1b2c3d4"
        nodeNum:
          type: integer
          example: 2715451348
        longName:
          type: string
          example: "My Mesh Node"
        shortName:
          type: string
          example: "MESH"
        role:
          type: string
          example: "CLIENT"
        hopsAway:
          type: integer
          example: 1
        latitude:
          type: number
          format: double
          example: 37.7749
        longitude:
          type: number
          format: double
          example: -122.4194
        lastHeard:
          type: integer
          example: 1699564800

    TopologyEdge:
      type: object
      properties:
        from:
          type: string
          description: Source node ID
          example: "!a1b2c3d4"
        to:
          type: string
          description: Destination node ID
          example: "!e5f6g7h8"
        route:
          type: array
          items:
            type: string
          description: Array of node IDs in the route
          example: ["!a1b2c3d4", "!i9j0k1l2", "!e5f6g7h8"]
        snr:
          type: array
          items:
            type: number
          description: Array of SNR values for each hop
          example: [8.5, 7.2, 9.1]

    Topology:
      type: object
      properties:
        nodes:
          type: array
          items:
            $ref: '#/components/schemas/TopologyNode'
        edges:
          type: array
          items:
            $ref: '#/components/schemas/TopologyEdge'

    TopologyResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/Topology'

    Packet:
      type: object
      properties:
        id:
          type: integer
          description: Unique packet log ID
          example: 12345
        packet_id:
          type: integer
          description: Packet identifier
          example: 987654
        timestamp:
          type: integer
          description: Unix timestamp
          example: 1699564800
        from_node:
          type: integer
          description: Source node number
          example: 2715451348
        from_node_id:
          type: string
          description: Source node ID (hex format)
          example: "!a1b2c3d4"
        from_node_longName:
          type: string
          description: Source node long name
          example: "My Mesh Node"
        to_node:
          type: integer
          description: Destination node number
          example: 2820214276
        to_node_id:
          type: string
          description: Destination node ID (hex format)
          example: "!e5f6g7h8"
        to_node_longName:
          type: string
          description: Destination node long name
          example: "Remote Node"
        channel:
          type: integer
          description: Channel number
          example: 0
        portnum:
          type: integer
          description: Port number (message type)
          example: 1
        portnum_name:
          type: string
          description: Port name
          example: "TEXT_MESSAGE_APP"
        encrypted:
          type: boolean
          description: Whether packet was encrypted
          example: false
        snr:
          type: number
          format: float
          description: Signal-to-noise ratio
          example: 8.5
        rssi:
          type: integer
          description: Received signal strength in dBm
          example: -95
        hop_limit:
          type: integer
          description: Hop limit
          example: 3
        hop_start:
          type: integer
          description: Starting hop count
          example: 3
        payload_size:
          type: integer
          description: Size of payload in bytes
          example: 128
        want_ack:
          type: boolean
          description: Whether acknowledgment was requested
          example: false
        priority:
          type: integer
          description: Packet priority
          example: 64

    PacketListResponse:
      type: object
      required:
        - success
        - count
        - total
        - offset
        - limit
        - data
      properties:
        success:
          type: boolean
          example: true
        count:
          type: integer
          description: Number of packets returned in this response
          example: 100
        total:
          type: integer
          description: Total number of packets matching the filters
          example: 5432
        offset:
          type: integer
          description: Offset used for pagination
          example: 0
        limit:
          type: integer
          description: Limit used for pagination
          example: 100
        data:
          type: array
          items:
            $ref: '#/components/schemas/Packet'

    PacketResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/Packet'

    SolarEstimate:
      type: object
      properties:
        timestamp:
          type: integer
          description: Unix timestamp (seconds) for the estimate period
          example: 1699560000
        datetime:
          type: string
          format: date-time
          description: ISO 8601 datetime string
          example: "2024-11-09T14:00:00.000Z"
        wattHours:
          type: number
          description: Estimated watt-hours of solar production for this period
          example: 450.5
        fetchedAt:
          type: integer
          description: Unix timestamp when this estimate was fetched from forecast.solar
          example: 1699557600

    SolarListResponse:
      type: object
      required:
        - success
        - count
        - data
      properties:
        success:
          type: boolean
          example: true
        count:
          type: integer
          description: Number of estimates returned
          example: 24
        data:
          type: array
          items:
            $ref: '#/components/schemas/SolarEstimate'

    SolarRangeResponse:
      type: object
      required:
        - success
        - count
        - start
        - end
        - data
      properties:
        success:
          type: boolean
          example: true
        count:
          type: integer
          description: Number of estimates returned
          example: 24
        start:
          type: integer
          description: Start timestamp of the requested range
          example: 1699520400
        end:
          type: integer
          description: End timestamp of the requested range
          example: 1699606800
        data:
          type: array
          items:
            $ref: '#/components/schemas/SolarEstimate'

paths:
  /:
    get:
      tags:
        - API Info
      summary: Get API version information
      description: Returns version information and available endpoints
      responses:
        '200':
          description: API information retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIInfo'
        '401':
          description: Unauthorized - invalid or missing API token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /sources:
    get:
      tags:
        - Sources
      summary: List sources the token can read
      description: |
        Returns the set of enabled sources that the authenticated token has
        read permission on (any of `nodes`, `messages`, or `channel_*:read`).
        Admin tokens see every enabled source. The first entry (by
        `createdAt`) is flagged `isPrimary: true` and is what the `default`
        alias resolves to.
      responses:
        '200':
          description: List of sources the token can read
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  count:
                    type: integer
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          description: Source UUID
                        name:
                          type: string
                        type:
                          type: string
                          enum: [meshtastic_tcp, mqtt, meshcore]
                        enabled:
                          type: boolean
                        isPrimary:
                          type: boolean
                          description: True for the first source (resolves `default`)
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /sources/{sourceId}/nodes:
    parameters:
      - $ref: '#/components/parameters/SourceIdParam'
    get:
      tags:
        - Nodes
      summary: Get nodes for a source (canonical)
      description: |
        Returns nodes visible for the given source, filtered by the token's
        per-source channel read permissions. This is the canonical replacement
        for the deprecated root-level `GET /api/v1/nodes?sourceId=...`.
      parameters:
        - name: active
          in: query
          description: Filter to only nodes active within the last `sinceDays` days
          required: false
          schema:
            type: boolean
            default: false
        - name: sinceDays
          in: query
          description: Activity window in days
          required: false
          schema:
            type: integer
            default: 7
            minimum: 1
      responses:
        '200':
          description: Nodes retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  count:
                    type: integer
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Node'
        '403':
          description: Insufficient permissions on the source
        '404':
          description: Source not found

  /nodes:
    get:
      tags:
        - Nodes
      deprecated: true
      summary: Get all nodes (DEPRECATED — use /sources/{sourceId}/nodes)
      description: |
        DEPRECATED. Returns `Warning: 299` header. Use
        `GET /api/v1/sources/{sourceId}/nodes` instead.
        Retrieve all nodes, optionally filtered by `?sourceId=`.
      parameters:
        - name: active
          in: query
          description: Filter to only active nodes (within last N days)
          required: false
          schema:
            type: boolean
            default: false
        - name: sinceDays
          in: query
          description: Number of days to consider for active nodes filter
          required: false
          schema:
            type: integer
            default: 7
            minimum: 1
      responses:
        '200':
          description: Nodes retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NodeListResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
